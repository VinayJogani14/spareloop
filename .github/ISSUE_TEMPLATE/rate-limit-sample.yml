name: Rate-limit message sample
description: The single most valuable contribution — a real rate-limit error message so spareloop can parse reset times reliably across tool versions.
title: "rate-limit sample: <tool> <version>"
labels: ["rate-limit-corpus"]
body:
  - type: markdown
    attributes:
      value: |
        spareloop parses reset times out of each tool's rate-limit error text. Phrasing
        changes across versions and it's impossible for us to trigger every variant
        ourselves — real samples from real hits are what keep the parser accurate.

        Please redact anything personal (emails, org names, request IDs are usually fine).
  - type: dropdown
    id: tool
    attributes:
      label: Tool
      options:
        - Claude Code
        - Codex CLI
        - Cursor CLI
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tool version
      placeholder: "e.g. claude --version output"
    validations:
      required: true
  - type: dropdown
    id: plan
    attributes:
      label: Plan tier
      options:
        - Free
        - Plus/Pro
        - Team/Max
        - Enterprise
        - API (pay-as-you-go)
    validations:
      required: true
  - type: textarea
    id: message
    attributes:
      label: Verbatim error message
      description: Copy-paste exactly what was printed (stdout and/or stderr), redacted as needed.
      render: text
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What kind of limit was this?
      options:
        - 5-hour / session window
        - Weekly cap
        - Monthly credit pool (Cursor)
        - Not sure
    validations:
      required: true
